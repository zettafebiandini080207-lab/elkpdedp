<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-LKPD Kincir Angin Kargo</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&amp;family=Comic+Neue:wght@400;700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'fredoka': ['Fredoka', 'sans-serif'],
            'comic': ['Comic Neue', 'cursive']
          },
          colors: {
            'sky-bright': '#0EA5E9',
            'sky-light': '#E0F2FE',
            'sky-mid': '#7DD3FC',
            'grass': '#22C55E',
            'sun': '#FBBF24'
          }
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }
    .wind-bg {
      background: linear-gradient(180deg, #0EA5E9 0%, #7DD3FC 30%, #E0F2FE 60%, #ECFDF5 100%);
    }
    .card-style {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(14,165,233,0.15);
      backdrop-filter: blur(10px);
    }
    .btn-primary {
      background: linear-gradient(135deg, #0EA5E9, #0284C7);
      color: white;
      border-radius: 50px;
      padding: 12px 28px;
      font-weight: 600;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(14,165,233,0.4); }
    .btn-secondary {
      background: linear-gradient(135deg, #22C55E, #16A34A);
      color: white;
      border-radius: 50px;
      padding: 10px 24px;
      font-weight: 600;
      transition: all 0.3s;
      border: none;
      cursor: pointer;
    }
    .section-title {
      background: linear-gradient(135deg, #0EA5E9, #0284C7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes spin-slow { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes cloud-move { 0%{transform:translateX(-100%)} 100%{transform:translateX(calc(100% + 200px))} }
    .float-anim { animation: float 3s ease-in-out infinite; }
    .spin-slow { animation: spin-slow 8s linear infinite; }
    .cloud { animation: cloud-move 20s linear infinite; }
    .cloud2 { animation: cloud-move 28s linear infinite; animation-delay: -8s; }
    .nav-dot { width: 10px; height: 10px; border-radius: 50%; background: #CBD5E1; transition: all 0.3s; }
    .nav-dot.active { background: #0EA5E9; width: 28px; border-radius: 5px; }
    textarea, input[type="text"] {
      border: 2px solid #E0F2FE;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      font-family: 'Comic Neue', cursive;
      font-size: 14px;
      transition: border-color 0.3s;
      resize: vertical;
    }
    textarea:focus, input[type="text"]:focus { border-color: #0EA5E9; outline: none; box-shadow: 0 0 0 3px rgba(14,165,233,0.1); }
    .radio-option {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; border: 2px solid #E0F2FE;
      border-radius: 12px; cursor: pointer; transition: all 0.2s;
      font-family: 'Comic Neue', cursive;
    }
    .radio-option:hover { border-color: #7DD3FC; background: #F0F9FF; }
    .radio-option.selected { border-color: #0EA5E9; background: #E0F2FE; }
    .step-badge {
      background: linear-gradient(135deg, #0EA5E9, #0284C7);
      color: white; border-radius: 50%; width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .letter-paper {
      background: #FFFEF7;
      border: 2px solid #D4A574;
      border-radius: 4px;
      padding: 24px;
      position: relative;
      font-family: 'Comic Neue', cursive;
      line-height: 1.8;
    }
    .letter-paper::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: repeating-linear-gradient(90deg, #D4A574, #D4A574 10px, transparent 10px, transparent 20px);
    }
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #065F46; color: white; padding: 12px 24px;
      border-radius: 50px; font-family: 'Fredoka', sans-serif;
      z-index: 9999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .score-display {
      background: linear-gradient(135deg, #FBBF24, #F59E0B);
      border-radius: 16px; padding: 20px; text-align: center; color: white;
    }
    .windmill-svg { width: 60px; height: 60px; }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full font-comic">
  <div id="app" class="h-full w-full wind-bg overflow-auto relative">
   <!-- Clouds -->
   <div class="fixed top-8 left-0 opacity-40 cloud pointer-events-none" style="z-index:1;">
    <svg width="80" height="40" viewbox="0 0 80 40"><ellipse cx="40" cy="25" rx="35" ry="15" fill="white" /><ellipse cx="25" cy="20" rx="20" ry="12" fill="white" /><ellipse cx="55" cy="18" rx="18" ry="11" fill="white" />
    </svg>
   </div>
   <div class="fixed top-20 left-0 opacity-30 cloud2 pointer-events-none" style="z-index:1;">
    <svg width="60" height="30" viewbox="0 0 60 30"><ellipse cx="30" cy="18" rx="25" ry="12" fill="white" /><ellipse cx="18" cy="14" rx="15" ry="9" fill="white" />
    </svg>
   </div><!-- Main Content -->
   <div id="content" class="relative z-10 px-4 py-6 max-w-lg mx-auto w-full" style="min-height:100%;">
    <!-- Pages will be rendered here -->
   </div><!-- Bottom Navigation -->
   <div class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-sky-200 px-4 py-3 z-50">
    <div class="max-w-lg mx-auto flex items-center justify-between">
     <button id="btn-prev" onclick="prevPage()" class="flex items-center gap-1 text-sky-600 font-fredoka font-semibold text-sm disabled:opacity-30" disabled> <i data-lucide="chevron-left" style="width:18px;height:18px;"></i> Kembali </button>
     <div id="nav-dots" class="flex gap-1.5 items-center"></div><button id="btn-next" onclick="nextPage()" class="flex items-center gap-1 text-sky-600 font-fredoka font-semibold text-sm"> Lanjut <i data-lucide="chevron-right" style="width:18px;height:18px;"></i> </button>
    </div>
   </div><!-- Toast -->
   <div id="toast" class="toast"></div>
  </div>
  <script>
    // ============ CONFIG & STATE ============
    const defaultConfig = {
      main_title: 'E-LKPD Kincir Angin Kargo',
      teacher_name: 'Guru IPA',
      background_color: '#0EA5E9',
      surface_color: '#FFFFFF',
      text_color: '#1E293B',
      primary_action_color: '#0EA5E9',
      secondary_action_color: '#22C55E',
      font_family: 'Fredoka',
      font_size: 16
    };

    let currentPage = 0;
    let studentData = { name: '', class: '' };
    let answers = {};
    let allRecords = [];
    const TOTAL_PAGES = 10;

    // ============ ELEMENT SDK ============
    window.elementSdk.init({
      defaultConfig,
      onConfigChange: async (config) => {
        document.documentElement.style.setProperty('--primary', config.background_color || defaultConfig.background_color);
        renderCurrentPage();
      },
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
          { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
        ],
        borderables: [],
        fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
        fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['teacher_name', config.teacher_name || defaultConfig.teacher_name]
      ])
    });

    // ============ DATA SDK ============
    const dataHandler = {
      onDataChanged(data) {
        allRecords = data;
      }
    };
    window.dataSdk.init(dataHandler);

    // ============ TOAST ============
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ============ NAVIGATION ============
    function updateNav() {
      const prev = document.getElementById('btn-prev');
      const next = document.getElementById('btn-next');
      prev.disabled = currentPage === 0;
      next.style.display = currentPage === TOTAL_PAGES - 1 ? 'none' : 'flex';
      const dots = document.getElementById('nav-dots');
      dots.innerHTML = '';
      for (let i = 0; i < TOTAL_PAGES; i++) {
        const d = document.createElement('div');
        d.className = 'nav-dot' + (i === currentPage ? ' active' : '');
        d.onclick = () => { currentPage = i; renderCurrentPage(); };
        dots.appendChild(d);
      }
    }

    function nextPage() {
      if (currentPage === 0) {
        const name = document.getElementById('input-name');
        const cls = document.getElementById('input-class');
        if (name && cls) {
          if (!name.value.trim() || !cls.value.trim()) { showToast('Isi nama dan kelas dulu ya! 📝'); return; }
          studentData.name = name.value.trim();
          studentData.class = cls.value.trim();
        }
      }
      if (currentPage < TOTAL_PAGES - 1) { currentPage++; renderCurrentPage(); }
    }
    function prevPage() { if (currentPage > 0) { currentPage--; renderCurrentPage(); } }

    // ============ SAVE ANSWER ============
    async function saveAnswer(section, answer) {
      if (allRecords.length >= 999) { showToast('Penyimpanan penuh!'); return; }
      const result = await window.dataSdk.create({
        student_name: studentData.name,
        student_class: studentData.class,
        section: section,
        answer: answer,
        score: 0,
        timestamp: new Date().toISOString()
      });
      if (result.isOk) { showToast('Jawaban tersimpan! ✅'); }
      else { showToast('Gagal menyimpan, coba lagi'); }
    }

    // ============ WINDMILL SVG ============
    function windmillSVG(size = 60) {
      return `<svg width="${size}" height="${size}" viewBox="0 0 100 100" class="spin-slow">
        <rect x="48" y="45" width="4" height="50" fill="#8B5E3C" rx="2"/>
        <circle cx="50" cy="45" r="5" fill="#475569"/>
        <path d="M50 45 L50 10 L60 40 Z" fill="#0EA5E9" opacity="0.9"/>
        <path d="M50 45 L80 55 L55 55 Z" fill="#38BDF8" opacity="0.9"/>
        <path d="M50 45 L50 80 L40 50 Z" fill="#0284C7" opacity="0.9"/>
        <path d="M50 45 L20 35 L45 35 Z" fill="#7DD3FC" opacity="0.9"/>
      </svg>`;
    }

    // ============ PAGE RENDERERS ============
    const pages = [
      // Page 0: Cover & Identity
      () => `
        <div class="text-center mb-6">
          <div class="float-anim inline-block mb-4">${windmillSVG(80)}</div>
          <h1 class="font-fredoka text-2xl font-bold section-title mb-2">E-LKPD</h1>
          <h2 class="font-fredoka text-lg font-semibold text-sky-700 mb-1">Kincir Angin Kargo</h2>
          <p class="text-sm text-sky-600 mb-1">Berbasis Project Based Learning</p>
          <p class="text-xs text-slate-500">Pendekatan Engineering Design Process</p>
          <div class="mt-2 inline-block bg-sky-100 px-3 py-1 rounded-full text-xs font-semibold text-sky-700">IPA Kelas VIII SMP/MTs</div>
        </div>
        <div class="card-style p-5 mb-4">
          <p class="text-sm font-semibold text-slate-700 mb-3 font-fredoka">👋 Hai! Isi data dirimu:</p>
          <label class="block text-xs font-semibold text-slate-600 mb-1" for="input-name">Nama Lengkap</label>
          <input type="text" id="input-name" placeholder="Tulis namamu..." value="${studentData.name}" class="mb-3">
          <label class="block text-xs font-semibold text-slate-600 mb-1" for="input-class">Kelas</label>
          <input type="text" id="input-class" placeholder="Contoh: VIII-A" value="${studentData.class}">
        </div>
        <div class="text-center">
          <div class="text-xs text-slate-500">Guru Pengampu: <strong>${window.elementSdk.config.teacher_name || defaultConfig.teacher_name}</strong></div>
          <div class="text-xs text-slate-400 mt-1">Semester Genap 2024/2025</div>
        </div>
      `,

      // Page 1: Kata Pengantar
      () => `
        <div class="card-style p-5">
          <div class="flex items-center gap-2 mb-4">
            <div class="step-badge">📖</div>
            <h2 class="font-fredoka text-lg font-bold text-sky-800">Kata Pengantar</h2>
          </div>
          <div class="text-sm text-slate-700 space-y-3 leading-relaxed">
            <p>Assalamu'alaikum Wr. Wb.</p>
            <p>Puji syukur kehadirat Allah SWT yang telah melimpahkan rahmat-Nya sehingga E-LKPD <strong>"Kincir Angin Kargo"</strong> ini dapat disusun dengan baik.</p>
            <p>E-LKPD ini dirancang sebagai panduan belajar berbasis proyek <em>(Project Based Learning)</em> dengan pendekatan <strong>Engineering Design Process (EDP)</strong> untuk membantu kalian memahami konsep energi kinetik angin dan penerapannya dalam teknologi sederhana.</p>
            <p>Melalui proyek ini, kalian akan berperan sebagai <strong>insinyur muda</strong> yang merancang solusi nyata bagi para petani di daerah perbukitan. Kalian akan belajar mengidentifikasi masalah, merancang solusi, membuat prototipe, menguji, dan menyempurnakan desain.</p>
            <p>Semoga E-LKPD ini bermanfaat dalam mengembangkan keterampilan berpikir kritis, kreatif, kolaboratif, dan komunikatif kalian.</p>
            <p>Wassalamu'alaikum Wr. Wb.</p>
            <p class="text-right font-semibold mt-4">${window.elementSdk.config.teacher_name || defaultConfig.teacher_name}<br><span class="font-normal text-xs text-slate-500">Guru IPA</span></p>
          </div>
        </div>
      `,

      // Page 2: CP & Tujuan
      () => `
        <div class="card-style p-5 mb-4">
          <div class="flex items-center gap-2 mb-4">
            <div class="step-badge">🎯</div>
            <h2 class="font-fredoka text-lg font-bold text-sky-800">Capaian & Tujuan</h2>
          </div>
          <div class="bg-sky-50 rounded-xl p-4 mb-4">
            <h3 class="font-fredoka text-sm font-bold text-sky-700 mb-2">📋 Capaian Pembelajaran (CP)</h3>
            <p class="text-xs text-slate-700 leading-relaxed">Peserta didik mampu menerapkan konsep energi dan perubahannya (energi kinetik, energi potensial, dan usaha) dalam merancang solusi teknologi sederhana untuk menyelesaikan permasalahan di lingkungan sekitar melalui proses rekayasa (Engineering Design Process).</p>
          </div>
          <div class="bg-green-50 rounded-xl p-4">
            <h3 class="font-fredoka text-sm font-bold text-green-700 mb-2">🏆 Tujuan Pembelajaran</h3>
            <ol class="text-xs text-slate-700 space-y-2 list-decimal pl-4 leading-relaxed">
              <li>Mengidentifikasi masalah nyata terkait pemanfaatan energi angin untuk transportasi barang</li>
              <li>Menjelaskan konsep energi kinetik angin dan konversinya menjadi energi mekanik</li>
              <li>Merancang desain kincir angin kargo menggunakan prinsip EDP</li>
              <li>Membuat prototipe kincir angin yang mampu mengangkat beban</li>
              <li>Menguji, mengevaluasi, dan menyempurnakan desain prototipe</li>
              <li>Mengkomunikasikan hasil proyek secara lisan dan tertulis</li>
            </ol>
          </div>
        </div>
      `,

      // Page 3: Surat Klien (Masalah)
      () => `
        <div class="card-style p-5 mb-4">
          <div class="flex items-center gap-2 mb-4">
            <div class="step-badge">✉️</div>
            <h2 class="font-fredoka text-lg font-bold text-sky-800">Surat dari Klien</h2>
          </div>
          <p class="text-xs text-slate-500 mb-3 italic">📬 Kalian menerima surat berikut dari seorang klien yang membutuhkan bantuan...</p>
          <div class="letter-paper text-sm">
            <p class="text-right text-xs text-slate-500 mb-3">Desa Angin Sejuk, 15 Januari 2025</p>
            <p class="mb-2"><strong>Kepada Yth.</strong><br>Tim Insinyur Muda Kelas VIII<br>SMP Nusantara Hebat</p>
            <p class="mb-2">Dengan hormat,</p>
            <p class="mb-2">Perkenalkan, nama saya <strong>Pak Tani Surya</strong>, ketua kelompok tani "Maju Bersama" di Desa Angin Sejuk. Desa kami terletak di daerah perbukitan dengan lahan perkebunan yang luas dan kontur tanah yang tidak rata.</p>
            <p class="mb-2">Kami menghadapi <strong>masalah besar</strong> dalam mengangkut hasil panen (sayur-mayur, buah-buahan) dari kebun di atas bukit ke gudang penyimpanan di bawah, serta mendistribusikan pupuk dari gudang ke kebun. Jaraknya sekitar 200-500 meter dengan kemiringan cukup tajam.</p>
            <p class="mb-2"><strong>Kondisi yang kami alami:</strong></p>
            <ul class="list-disc pl-5 mb-2 text-xs space-y-1">
              <li>Pengangkutan manual sangat menguras tenaga (butuh 3-4 orang)</li>
              <li>Memakan waktu 2-3 jam untuk satu kali angkut</li>
              <li>Biaya sewa kendaraan sangat mahal (Rp500.000/hari)</li>
              <li>Jalan setapak sempit, tidak bisa dilalui kendaraan besar</li>
              <li>Desa kami memiliki <strong>angin yang cukup kencang</strong> sepanjang tahun (rata-rata 15-25 km/jam)</li>
            </ul>
            <p class="mb-2">Kami dengar kalian sedang belajar tentang energi angin di sekolah. Bisakah kalian membantu kami merancang <strong>alat pengangkut barang bertenaga angin</strong> yang bisa memindahkan beban 5-10 kg melewati lintasan miring? Kami butuh solusi yang hemat biaya, ramah lingkungan, dan mudah dirawat.</p>
            <p class="mb-2">Kami sangat berharap bantuan dari tim insinyur muda!</p>
            <p class="mt-4">Hormat kami,<br><strong>Pak Tani Surya</strong><br><em>Ketua Kelompok Tani "Maju Bersama"</em></p>
            <div class="mt-3 text-xs bg-amber-50 border border-amber-200 rounded-lg p-2">
              📎 Lampiran: Foto lokasi kebun dan data kecepatan angin harian
              <div class="mt-2 rounded-lg overflow-hidden bg-white">
                <img src="https://cdn1.katadata.co.id/media/images/thumb/2022/10/25/SUMBER_DAYA_ALAM_DATARAN_TINGGI-2022_10_25-15_00_27_648842f3bf9a8617353b90d5976c392e_960x640_thumb.jpg" alt="Foto lokasi kebun dataran tinggi" loading="lazy" style="width:100%; height:auto; display:block;" onerror="console.error('Image failed to load:', this.src); this.style.background='#e5e7eb'; this.alt='Foto kebun tidak tersedia';"/>
              </div>
              <div class="mt-1 text-xs text-amber-700 font-semibold">Data Angin: Rata-rata 15-25 km/jam | Musim kemarau hingga musim hujan</div>
            </div>
          </div>
        </div>
      `,

      // Page 4: EDP Step 1 - Define Problem
      () => `
        <div class="card-style p-5 mb-4">
          <div class="flex items-center gap-2 mb-4">
            <div class="step-badge">1</div>
            <div>
              <h2 class="font-fredoka text-base font-bold text-sky-800">Define the Problem</h2>
              <p class="text-xs text-slate-500">Mendefinisikan Masalah</p>
            </div>
          </div>
          <div class="bg-sky-50 rounded-xl p-3 mb-4 text-xs text-slate-700">
            <p class="font-semibold mb-1">💡 Petunjuk:</p>
            <p>Setelah membaca surat dari Pak Tani Surya, identifikasi dan rumuskan masalah utama yang perlu diselesaikan. Gunakan kalimat kalian sendiri!</p>
          </div>
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">1. Siapa yang mengalami masalah? (Klien)</label>
              <textarea id="edp1-q1" rows="2" placeholder="Tuliskan siapa klien dan kondisinya..." oninput="answers['edp1_q1']=this.value">${answers['edp1_q1'] || ''}</textarea>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">2. Apa masalah utamanya?</label>
              <textarea id="edp1-q2" rows="2" placeholder="Rumuskan masalah inti..." oninput="answers['edp1_q2']=this.value">${answers['edp1_q2'] || ''}</textarea>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">3. Apa batasan (constraints) yang ada?</label>
              <textarea id="edp1-q3" rows="2" placeholder="Sebutkan batasan: biaya, bahan, lokasi..." oninput="answers['edp1_q3']=this.value">${answers['edp1_q3'] || ''}</textarea>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1">4. Apa kriteria keberhasilan solusi?</label>
              <textarea id="edp1-q4" rows="2" placeholder="Solusi berhasil jika..." oninput="answers['edp1_q4']=this.value">${answers['edp1_q4'] || ''}</textarea>
